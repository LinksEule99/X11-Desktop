# Alacritty Configuration
# Theme: Gruvbox with white foreground + transparency

[window]
opacity = 0.75
decorations = "full"
dynamic_title = true

[window.padding]
x = 8
y = 8

[scrolling]
history = 10000

[font]
size = 7.0

[font.normal]
family = "monospace"
style = "Regular"

[font.bold]
family = "monospace"
style = "Bold"

[font.italic]
family = "monospace"
style = "Italic"

# Gruvbox Dark palette with white foreground text
[colors.primary]
background = "#282828"
foreground = "#ffffff"

[colors.cursor]
text   = "#282828"
cursor = "#ffffff"

[colors.vi_mode_cursor]
text   = "#282828"
cursor = "#d5c4a1"

[colors.selection]
text       = "#282828"
background = "#d79921"

# Gruvbox normal colours
[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

# Gruvbox bright colours
[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[cursor]
style = { shape = "Block", blinking = "Off" }

[env]
TERM = "xterm-256color"
